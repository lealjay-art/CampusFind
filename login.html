<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – CampusFind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="cf-login-page">
    <div class="cf-login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">📡</div>
        <h1>CampusFind</h1>
        <p>Admin Portal — Authorized access only</p>
      </div>

      <!-- Login Box -->
      <div class="login-box">

        <!-- Demo credentials -->
        <div class="demo-creds">
          <strong>Demo credentials</strong><br>
          Username: <code>admin</code> &nbsp;&nbsp; Password: <code>campusfind2026</code>
        </div>

        <div id="loginAlert" class="mb-3"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Enter username" autocomplete="username" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Enter password" autocomplete="current-password" required>
              <button type="button" class="toggle-pw" onclick="togglePasswordVisibility()" title="Toggle">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-cf-primary w-100" id="loginBtn" style="justify-content:center;">
            Sign In to Dashboard
          </button>
        </form>

        <div class="login-back">
          <a href="index.html">← Back to public board</a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isAdminLoggedIn()) { window.location.href = 'dashboard.html'; return; }
      document.getElementById('loginForm').addEventListener('submit', handleLoginSubmit);
    });
    function togglePasswordVisibility() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
